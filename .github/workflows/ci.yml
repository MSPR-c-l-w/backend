name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (npm ci)
        working-directory: backend
        run: npm ci

      - name: Unit tests
        working-directory: backend
        run: npm test

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Format (must not change files)
        working-directory: backend
        run: |
          npm run format
          git diff --exit-code

