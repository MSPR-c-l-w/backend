name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Discord CI notification
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set, skipping Discord notification."
            exit 0
          fi

          short_sha="$(echo "$SHA" | cut -c1-7)"

          if [ "$JOB_STATUS" = "success" ]; then
            color=5763719
            title="✅ CI réussie"
          elif [ "$JOB_STATUS" = "failure" ]; then
            color=15548997
            title="❌ CI en échec"
          else
            color=16705372
            title="⚠️ CI terminée avec statut: $JOB_STATUS"
          fi

          payload="$(cat <<EOF
          {
            "embeds": [
              {
                "title": "$title",
                "description": "Pipeline CI du backend.",
                "color": $color,
                "fields": [
                  { "name": "Status", "value": "$JOB_STATUS", "inline": true },
                  { "name": "Branche", "value": "$BRANCH", "inline": true },
                  { "name": "Event", "value": "$EVENT_NAME", "inline": true },
                  { "name": "Repository", "value": "$REPO", "inline": true },
                  { "name": "Commit", "value": "$short_sha", "inline": true },
                  { "name": "Actor", "value": "$ACTOR", "inline": true },
                  { "name": "Run #", "value": "$RUN_NUMBER", "inline": true },
                  { "name": "Logs", "value": "[Voir le workflow]($RUN_URL)", "inline": true }
                ],
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          EOF
          )"

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

